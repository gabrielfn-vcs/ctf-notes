{# Render Flask messages. #}
{%- macro render() -%}
{% with messages = get_flashed_messages(with_categories=True) %}
{% if messages %}
<div id="flash-messages" class="row justify-content-center sm-margin-top">
    {% for category, msg in messages %}
    <div class="col-sm-4 alert alert-success alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}
</div>
{% endif %}
{% endwith %}
{%- endmacro -%}
