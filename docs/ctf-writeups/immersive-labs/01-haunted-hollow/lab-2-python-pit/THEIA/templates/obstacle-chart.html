<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Obstacle Log</title>
    <link rel="stylesheet" href="../static/css/bootstrap.min.css">
    <style>
        body {
            background-color: #FF5733; /* Halloween Orange */
            color: #582900; /* Dark Brown */
            font-family: 'Creepster', cursive; /* Halloween font */
        }
        .card {
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        {% for log in logs %}
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">{{ log.operator }}</h5>
                    <h6 class="card-subtitle mb-2 text-muted">{{ log.obstacle }}</h6>
                    <p class="card-text">Timestamp: {{ log.timestamp }}</p>
                    <canvas id="chart{{ loop.index }}"></canvas>
                </div>
            </div>
        {% endfor %}
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.min.js"></script>
    <script>
        {% for log in logs %}
            var ctx = document.getElementById('chart{{ loop.index }}').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Operational', 'Rate'],
                    datasets: [{
                        label: 'Values',
                        data: [{{ log.operational_at_time }}, {{ log.rate_at_time }}],
                        backgroundColor: [
                            'rgba(255, 99, 132, 0.2)',
                            'rgba(54, 162, 235, 0.2)'
                        ],
                        borderColor: [
                            'rgba(255, 99, 132, 1)',
                            'rgba(54, 162, 235, 1)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    scales: {
                        yAxes: [{
                            ticks: {
                                beginAtZero: true
                            }
                        }]
                    }
                }
            });
        {% endfor %}
    </script>
</body>
</html>
